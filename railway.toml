# Railway config-as-code: build and run the server only.
# If build still fails with TS6059/shared, set env NO_CACHE=1 and redeploy once.

[build]
builder = "railpack"
buildCommand = "cd server && npm install && node scripts/fix-pocha-imports.cjs && npm run build"

[deploy]
# Dockerfile puts dist at /app; Railpack uses repo root so would need "cd server && npm start"
startCommand = "node dist/index.js"
